services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: senus
      POSTGRES_PASSWORD: senus
      POSTGRES_DB: senus
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://senus:senus@db:5432/senus
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports: ["8000:8000"]
    depends_on: [db]
volumes:
  pgdata:
